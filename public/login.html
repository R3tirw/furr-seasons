<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furr Seasons — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #1B2A7A;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-card {
    background: #fff;
    border-radius: 18px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.25);
    position: relative; z-index: 1;
  }
  .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .logo-icon {
    width: 52px; height: 52px; background: #FFCC00;
    border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 26px;
  }
  .logo-name { font-family: 'Alfa Slab One', serif; font-size: 22px; color: #1B2A7A; line-height: 1.1; }
  .logo-sub { font-size: 11px; color: #4A5580; text-transform: uppercase; letter-spacing: 0.07em; margin-top: 2px; }
  h2 { font-family: 'Alfa Slab One', serif; font-size: 20px; color: #1B2A7A; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #4A5580; margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  label { display:block; font-size:11px; font-weight:700; color:#4A5580; text-transform:uppercase; letter-spacing:0.07em; margin-bottom:6px; }
  input {
    width: 100%; padding: 11px 14px;
    border: 1.5px solid #E0E8FF; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    color: #0D1640; background: #FFFCF0; outline: none; transition: border 0.15s;
  }
  input:focus { border-color: #1B2A7A; background: #fff; }
  .btn-login {
    width: 100%; padding: 13px;
    background: #FFCC00; color: #1B2A7A;
    border: none; border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 8px; transition: background 0.15s;
  }
  .btn-login:hover { background: #D4A800; }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
  .error {
    background: #FDECEA; color: #C0290A; border-radius: 8px;
    padding: 10px 14px; font-size: 13px; font-weight: 500;
    margin-top: 14px; display: none;
  }
  .paw-bg {
    position: fixed; inset: 0; opacity: 0.04;
    font-size: 120px; display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 0;
  }
</style>
</head>
<body>
<div class="paw-bg">🐾</div>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🐾</div>
    <div>
      <div class="logo-name">Furr Seasons</div>
      <div class="logo-sub">Pet Boarding & Training</div>
    </div>
  </div>
  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to manage your facility</p>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="admin" autocomplete="username" />
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
  </div>
  <button class="btn-login" id="login-btn">Sign In</button>
  <div class="error" id="error-msg"></div>
</div>
<script src="/js/login.js"></script>
</body>
</html>
