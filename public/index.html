<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furr Seasons — Boarding Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar" id="topbar">
  <button class="hamburger" id="hamburger">☰</button>
  <div class="topbar-brand">Furr <span>Seasons</span></div>
  <span style="width:28px"></span>
</header>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo">🐾</div>
      <div><div class="brand-name">Furr Seasons</div><div class="brand-sub">Pet Boarding &amp; Training</div></div>
    </div>
    <nav>
      <a class="nav-link active" data-page="dashboard"><span class="nav-icon">🏠</span> Dashboard</a>
      <a class="nav-link" data-page="calendar"><span class="nav-icon">📆</span> Calendar</a>
      <a class="nav-link" data-page="bookings"><span class="nav-icon">📅</span> Bookings</a>
      <a class="nav-link" data-page="pets"><span class="nav-icon">🐕</span> Dogs</a>
      <a class="nav-link" data-page="owners"><span class="nav-icon">👤</span> Owners</a>
      <a class="nav-link" data-page="invoices"><span class="nav-icon">🧾</span> Invoices</a>
      <a class="nav-link" data-page="staff"><span class="nav-icon">👥</span> Staff</a>
      <a class="nav-link" data-page="settings"><span class="nav-icon">⚙️</span> Settings</a>
    </nav>
    <div class="sidebar-footer">
      <div class="capacity-bar">
        <div class="capacity-label"><span>Kennel Capacity</span><span id="capacity-count">— / 18</span></div>
        <div class="capacity-track"><div class="capacity-fill" id="capacity-fill"></div></div>
      </div>
      <div class="today-date" id="today-date"></div>
      <button class="btn-logout" id="logout-btn">🚪 Sign Out</button>
    </div>
  </aside>

  <main class="main-content">
    <div id="page-dashboard" class="page active"></div>
    <div id="page-calendar" class="page"></div>
    <div id="page-bookings" class="page"></div>
    <div id="page-pets" class="page"></div>
    <div id="page-owners" class="page"></div>
    <div id="page-invoices" class="page"></div>
    <div id="page-staff" class="page"></div>
    <div id="page-settings" class="page"></div>
  </main>
</div>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal" id="modal">
    <div class="modal-header"><h3 id="modal-title"></h3><button class="modal-close" id="modal-close">✕</button></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div id="toast" class="toast hidden"></div>

<script src="js/api.js"></script>
<script src="js/modal.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/calendar.js"></script>
<script src="js/bookings.js"></script>
<script src="js/pets.js"></script>
<script src="js/owners.js"></script>
<script src="js/invoices.js"></script>
<script src="js/staff.js"></script>
<script src="js/settings.js"></script>
<script src="js/app.js"></script>
</body>
</html>
